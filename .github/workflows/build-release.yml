name: Build & Release NotesApp

on:
  push:
    tags:
      - 'p*'  # p1, p2, p3... APP 版本标签

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npx vite build --mode prod

      - name: Build Tauri app (signed)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: .
          tauriScript: npx tauri
          tagName: ${{ github.ref_name }}
          releaseName: '彩云笔记 ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download and install this version.'
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

  # 发布后上传更新文件到服务器
  deploy-updates:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p downloads
          # 直接按 tag 下载 release assets
          cd downloads
          gh release download ${{ github.ref_name }} --repo ${{ github.repository }} --clobber
          cd ..
          echo "=== Downloaded files ==="
          ls -la downloads/ || echo "No files downloaded"

      - name: Generate latest.json & organize files
        run: |
          TAG="${{ github.ref_name }}"
          # 版本号：直接使用 tauri.conf.json 中的完整版本号格式 2.0.0-p1
          # github.ref_name = p1，对应 tauri.conf.json version = 2.0.0-p1
          VERSION="2.0.0-${TAG}"
          
          mkdir -p staged/windows-x86_64 staged/darwin-x86_64 staged/linux-x86_64
          
          # 查找并移动各平台文件
          echo "=== Downloads contents ==="
          ls -la downloads/ || true
          
          # Windows
          for f in downloads/*x64*setup.nsis.zip*; do
            [ -f "$f" ] && cp "$f" staged/windows-x86_64/ && echo "Windows: $(basename $f)"
          done
          
          # macOS x86_64
          for f in downloads/*x86_64*.app.tar.gz*; do
            [ -f "$f" ] && cp "$f" staged/darwin-x86_64/ && echo "macOS x64: $(basename $f)"
          done
          # 如果没有明确的 x86_64 标识但有 .app.tar.gz 且不是 aarch64
          if [ -z "$(ls staged/darwin-x86_64/*.tar.gz 2>/dev/null)" ]; then
            for f in downloads/*.app.tar.gz; do
              [[ "$f" != *"aarch64"* ]] && [ -f "$f" ] && cp "$f" staged/darwin-x86_64/ && echo "macOS x64 (fallback): $(basename $f)"
            done
          fi
          
          # macOS ARM
          for f in downloads/*aarch64*.app.tar.gz*; do
            [ -f "$f" ] && cp "$f" staged/darwin-aarch64/ && echo "macOS ARM: $(basename $f)"
          done
          
          # Linux
          for f in downloads/*.AppImage.tar.gz*; do
            [ -f "$f" ] && cp "$f" staged/linux-x86_64/ && echo "Linux: $(basename $f)"
          done
          
          BASE_URL="http://49.235.160.8:3011/updates"
          
          # 读取签名文件并导出环境变量给 python 使用
          export VERSION TAG BASE_URL
          export WINDOWS_SIG=$(cat staged/windows-x86_64/*.sig 2>/dev/null | head -1 || echo "")
          export MACOS_X64_SIG=$(cat staged/darwin-x86_64/*.sig 2>/dev/null | head -1 || echo "")
          export MACOS_ARM_SIG=$(cat staged/darwin-aarch64/*.sig 2>/dev/null | head -1 || echo "")
          export LINUX_SIG=$(cat staged/linux-x86_64/*.sig 2>/dev/null | head -1 || echo "")
          
          # 获取文件名
          export WINDOWS_FILE=$(ls staged/windows-x86_64/*.zip 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")
          export MACOS_X64_FILE=$(ls staged/darwin-x86_64/*.tar.gz 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")
          export MACOS_ARM_FILE=$(ls staged/darwin-aarch64/*.tar.gz 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")
          export LINUX_FILE=$(ls staged/linux-x86_64/*.tar.gz 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")
          
          echo "=== Generating latest.json ==="
          echo "Version: ${VERSION}"
          echo "Windows: ${WINDOWS_FILE} sig=${WINDOWS_SIG:0:20}..."
          echo "macOS x64: ${MACOS_X64_FILE} sig=${MACOS_X64_SIG:0:20}..."
          echo "macOS ARM: ${MACOS_ARM_FILE} sig=${MACOS_ARM_SIG:0:20}..."
          echo "Linux: ${LINUX_FILE} sig=${LINUX_SIG:0:20}..."
          
          # 生成 latest.json（使用 python 确保 JSON 合法）
          python3 << 'PYEOF'
          import json, datetime, os
          version = os.environ['VERSION']
          tag = os.environ['TAG']
          base_url = os.environ['BASE_URL']
          windows_file = os.environ.get('WINDOWS_FILE', '')
          macos_x64_file = os.environ.get('MACOS_X64_FILE', '')
          macos_arm_file = os.environ.get('MACOS_ARM_FILE', '')
          linux_file = os.environ.get('LINUX_FILE', '')
          windows_sig = os.environ.get('WINDOWS_SIG', '')
          macos_x64_sig = os.environ.get('MACOS_X64_SIG', '')
          macos_arm_sig = os.environ.get('MACOS_ARM_SIG', '')
          linux_sig = os.environ.get('LINUX_SIG', '')

          data = {
            'version': version,
            'notes': f'彩云笔记 {tag} 更新',
            'pub_date': datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'),
            'platforms': {}
          }
          platforms = data['platforms']
          if windows_file:
            platforms['windows-x86_64'] = {'url': f'{base_url}/windows-x86_64/{windows_file}', 'signature': windows_sig}
          if macos_x64_file:
            platforms['darwin-x86_64'] = {'url': f'{base_url}/darwin-x86_64/{macos_x64_file}', 'signature': macos_x64_sig}
          if macos_arm_file:
            platforms['darwin-aarch64'] = {'url': f'{base_url}/darwin-aarch64/{macos_arm_file}', 'signature': macos_arm_sig}
          if linux_file:
            platforms['linux-x86_64'] = {'url': f'{base_url}/linux-x86_64/{linux_file}', 'signature': linux_sig}
          with open('latest.json', 'w') as f:
            json.dump(data, f, indent=2)
          print(json.dumps(data, indent=2))
          PYEOF
          
          # 把 latest.json 复制到每个平台目录
          for dir in staged/*/; do
            cp latest.json "$dir"
          done

      - name: Upload to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 49.235.160.8
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "staged/*,staged/**/*,latest.json"
          target: "/notesapp/updates"
          strip_components: 1

      - name: Verify updates on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 49.235.160.8
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "=== Updates directory ==="
            find /notesapp/updates -type f | sort
            echo ""
            echo "=== latest.json ==="
            cat /notesapp/updates/latest.json 2>/dev/null || echo "NOT FOUND"
            echo ""
            echo "=== Test updater endpoint ==="
            curl -s http://127.0.0.1:3011/updates/latest.json | head -20 || echo "endpoint test failed"
