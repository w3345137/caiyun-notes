name: Build & Release NotesApp

on:
  push:
    tags:
      - 'p*'  # p1, p2, p3... APP 版本标签

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npx vite build --mode prod

      - name: Build Tauri app (signed)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: .
          tauriScript: npx tauri
          tagName: ${{ github.ref_name }}
          releaseName: '彩云笔记 ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download and install this version.'
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

  # 发布后上传更新文件到服务器
  deploy-updates:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p downloads
          # 直接按 tag 下载 release assets
          cd downloads
          gh release download ${{ github.ref_name }} --repo ${{ github.repository }} --clobber
          cd ..
          echo "=== Downloaded files ==="
          ls -la downloads/ || echo "No files downloaded"

      - name: Generate latest.json & organize files
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="2.0.0-${TAG}"
          BASE_URL="https://notes.binapp.top/updates"

          export TAG VERSION BASE_URL

          mkdir -p staged/windows-x86_64 staged/darwin-x86_64 staged/darwin-aarch64 staged/linux-x86_64

          echo "=== Downloads contents ==="
          ls -la downloads/ || true

          # 使用 Python 完成所有文件操作，避免 shell glob 对 Unicode 文件名的处理问题
          python3 << 'PYEOF'
          import json, datetime, os, shutil, glob

          version = os.environ['VERSION']
          tag = os.environ['TAG']
          base_url = os.environ['BASE_URL']

          downloads = list(glob.glob('downloads/*'))

          # 平台分发规则：(目标目录, 匹配关键词列表)
          # 文件名同时检查 .sig 和安装包
          platform_rules = [
              ('staged/windows-x86_64', ['x64-setup.nsis.zip', 'x64_en-us.msi', 'x64-setup.nsis.zip.sig', 'x64_en-us.msi.sig', 'x64-setup.exe', 'x64_en-us.msi']),
              ('staged/darwin-x86_64',  ['x86_64.app.tar.gz', 'x64.app.tar.gz', 'x86_64.dmg', 'x64.dmg']),
              ('staged/darwin-aarch64', ['aarch64.app.tar.gz', 'aarch64.dmg']),
              ('staged/linux-x86_64',   ['amd64.AppImage.tar.gz', 'amd64.deb', 'amd64.AppImage.tar.gz.sig', 'amd64.deb.sig']),
          ]
          # macOS x64 fallback: .app.tar.gz 或 .dmg 且不含 aarch64
          platform_fallbacks = [
              ('staged/darwin-x86_64', lambda f: ('.app.tar.gz' in f or '.dmg' in f) and 'aarch64' not in f),
          ]

          platform_files = {r[0]: [] for r in platform_rules}
          assigned = set()

          for f in downloads:
              fn = os.path.basename(f)
              for dest, keywords in platform_rules:
                  if any(k in fn for k in keywords):
                      shutil.copy2(f, dest)
                      platform_files[dest].append(f)
                      assigned.add(f)
                      print(f"[{dest}] {fn}")
                      break

          # fallback for darwin-x86_64
          for f in downloads:
              if f in assigned:
                  continue
              fn = os.path.basename(f)
              for dest, pred in platform_fallbacks:
                  if pred(fn):
                      shutil.copy2(f, dest)
                      platform_files[dest].append(f)
                      assigned.add(f)
                      print(f"[{dest}] (fallback) {fn}")

          # 构建 latest.json
          data = {
              'version': version,
              'notes': f'彩云笔记 {tag} 更新',
              'pub_date': datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'),
              'platforms': {}
          }

          platform_ids = {
              'staged/windows-x86_64': 'windows-x86_64',
              'staged/darwin-x86_64': 'darwin-x86_64',
              'staged/darwin-aarch64': 'darwin-aarch64',
              'staged/linux-x86_64': 'linux-x86_64',
          }

          for staged_dir, pid in platform_ids.items():
              files_in_dir = os.listdir(staged_dir)
              # 找安装包（排除 .sig 和 .json）
              pkgs = [x for x in files_in_dir if not x.endswith('.sig') and not x.endswith('.json')]
              sigs = [x for x in files_in_dir if x.endswith('.sig')]
              if pkgs:
                  pkg_file = pkgs[0]
                  sig_content = ''
                  if sigs:
                      sig_file = sigs[0]
                      sig_path = os.path.join(staged_dir, sig_file)
                      with open(sig_path, 'r') as sf:
                          sig_content = sf.read().strip()
                  data['platforms'][pid] = {
                      'url': f'{base_url}/{pid}/{pkg_file}',
                      'signature': sig_content,
                  }
                  print(f"[{pid}] pkg={pkg_file} sig={'YES' if sig_content else 'MISSING'}")

          with open('latest.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, indent=2, ensure_ascii=False)
          print("=== Generated latest.json ===")
          print(json.dumps(data, indent=2, ensure_ascii=False))

          # 复制 latest.json 到各平台子目录
          for staged_dir in platform_ids:
              shutil.copy2('latest.json', staged_dir)
          PYEOF

      - name: Upload to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 49.235.160.8
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "staged/**/*,latest.json"
          target: "/notesapp/updates-tmp"
          strip_components: 1

      - name: Move updates into place
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 49.235.160.8
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 把各平台文件合并到正式目录
            for dir in /notesapp/updates-tmp/*/; do
              [ -d "$dir" ] && cp -r "$dir" /notesapp/updates/
            done
            # 把根 latest.json 放到正式目录
            cp -f /notesapp/updates-tmp/latest.json /notesapp/updates/latest.json 2>/dev/null || true
            rm -rf /notesapp/updates-tmp
            echo "=== Updates directory after deploy ==="
            find /notesapp/updates -type f | sort

      - name: Verify updates on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 49.235.160.8
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "=== Root latest.json ==="
            cat /notesapp/updates/latest.json 2>/dev/null && echo "" || echo "CRITICAL: root latest.json MISSING"
            echo "=== All update files ==="
            find /notesapp/updates -type f | sort
            echo ""
            echo "=== Endpoint test ==="
            RESP=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3011/updates/latest.json)
            echo "HTTP Status: ${RESP}"
            curl -s http://127.0.0.1:3011/updates/latest.json | python3 -m json.tool 2>/dev/null || echo "Invalid JSON"
